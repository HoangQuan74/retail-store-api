apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: retail-store-dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: ConfigMap
      name: retail-store-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: development
      - op: replace
        path: /data/LOG_LEVEL
        value: debug
