apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: retail-store
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: retail-store-admin:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: retail-store-config
            - secretRef:
                name: retail-store-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: retail-store
spec:
  selector:
    app: admin
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
