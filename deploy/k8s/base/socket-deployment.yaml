apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket
  namespace: retail-store
  labels:
    app: socket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socket
  template:
    metadata:
      labels:
        app: socket
    spec:
      containers:
        - name: socket
          image: retail-store-socket:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: retail-store-config
            - secretRef:
                name: retail-store-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: socket
  namespace: retail-store
spec:
  selector:
    app: socket
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
