services:
  # ───── Go Apps ─────
  api:
    build:
      context: .
      args:
        SERVICE: api
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - nats
      - elasticsearch
    restart: unless-stopped

  admin:
    build:
      context: .
      args:
        SERVICE: admin
    ports:
      - "8082:8082"
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - nats
      - elasticsearch
    restart: unless-stopped

  socket:
    build:
      context: .
      args:
        SERVICE: socket
    ports:
      - "8081:8081"
    env_file:
      - .env.docker
    depends_on:
      - redis
    restart: unless-stopped

  consumer:
    build:
      context: .
      args:
        SERVICE: consumer
    env_file:
      - .env.docker
    depends_on:
      - nats
      - elasticsearch
    restart: unless-stopped

  # ───── Infrastructure ─────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 160402
      POSTGRES_DB: retail_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["--jetstream"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  # ───── ELK ─────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    volumes:
      - ./deploy/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:
